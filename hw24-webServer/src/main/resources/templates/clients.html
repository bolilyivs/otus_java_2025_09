<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Клиенты</title>
</head>

<body>
<h4>Добавить клиента</h4>
<form  method="POST">
    <div class="mb-3">
        <label for="tb_name" class="tb_name-label">Введите имя клиента</label>
        <input type="text" class="form-control" id="tb_name" name="name">
    </div>
    <div class="mb-3">
        <label for="tb_password" class="tb_password-label">Введите пароль клиента</label>
        <input type="password" class="form-control" id="tb_password" name="password">
    </div>
    <div class="mb-3">
        <label for="tb_address" class="tb_address-label">Введите адрес клиента</label>
        <input type="text" class="form-control" id="tb_address" name="address">
    </div>
    <div class="mb-3">
        <label for="tb_phone" class="tb_phone-label">Введите телефон клиента</label>
        <input type="text" class="form-control" id="tb_phone" name="phone">
    </div>
    <button type="submit" class="btn btn-primary">Создать</button>
</form>

<h4>Клиенты</h4>
<table class="table">
    <thead>
    <tr>
        <th scope="col">#</th>
        <th scope="col">Имя</th>
        <th scope="col">Адрес</th>
        <th scope="col">Телефон</th>
    </tr>
    </thead>
    <tbody>
    <#list clientList as item>
    <tr>
        <th scope="row">${item.id}</th>
        <td>${item.name}</td>
        <td>${item.address}</td>
        <td>${item.phone}</td>
    </tr>
    </#list>
    </tbody>
</table>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</html>
